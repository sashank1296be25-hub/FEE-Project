<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity - Fluid Ledger</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="activity-page">
        <nav class="bottom-nav">
            <div class="fab-wrapper" style="opacity: 0; pointer-events: none;"><button class="fab"></button></div>
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-border-all"></i><span>Home</span>
            </a>
            <a href="activity.html" class="nav-item active">

            <a href="about.html" class="nav-item">

            </a>

                <i class="fa-solid fa-gear"></i><span>Settings</span>

            <div class="filter-tabs" style="justify-content: center;">
                <button class="filter-tab active" onclick="filterData('all', this)">All</button>

    <script src="script.js"></script>
